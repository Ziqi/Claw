version: '3.8'

# CatTeam 微型靶场 — 用于自动化测试 (make test)
# 网络: catteam_range (自建 bridge, 子网 172.30.0.0/24)

networks:
  catteam_range:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  # 靶机 1: 脆弱 Web (验证 02-probe + 03-web)
  vuln-web:
    image: vulnerables/web-dvwa
    container_name: catteam_target_web
    networks:
      catteam_range:
        ipv4_address: 172.30.0.10
    restart: unless-stopped

  # 靶机 2: SMB 共享 (验证 06-psexec 认证)
  vuln-smb:
    image: dperson/samba
    container_name: catteam_target_smb
    command: '-u "testadmin;CatTeam123!" -s "TestShare;/share;yes;no;no;testadmin"'
    networks:
      catteam_range:
        ipv4_address: 172.30.0.20
    restart: unless-stopped
